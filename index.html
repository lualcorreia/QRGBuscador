<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP2LA Buscador de Frequências</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        /* CSS Profissional - Dashboard Style */
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --danger: #ef4444;
            --success: #10b981;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #0f172a;        
            --surface: #1e293b;   
            --border: #334155;    
            --text: #f8fafc;      
            --text-muted: #94a3b8;
            --input-bg: #0f172a;
            --row-hover: #38bdf822;
            --overlay: rgba(15, 23, 42, 0.8);
        }

        [data-theme="light"] {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --border: #cbd5e1;
            --text: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f8fafc;
            --row-hover: #e0f2fe;
            --overlay: rgba(15, 23, 42, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Scrollbars Customizados */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Barra de Navegação Superior */
        .topbar {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .brand {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .brand-highlight {
            color: var(--primary);
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
        }

        .btn-text {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .btn-text:hover { color: var(--text); background-color: var(--border); }

        /* Container Principal */
        .app-layout {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 16px 24px;
            gap: 16px;
            overflow: hidden;
        }

        /* Barra de Ferramentas (Filtros) */
        .toolbar {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input, select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
            height: 34px;
        }

        input:focus, select:focus { border-color: var(--primary); }

        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 0 20px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            height: 34px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover { background-color: var(--primary-hover); }

        /* Área de Dados (Tabela e Mapa) */
        .data-workspace {
            display: flex;
            gap: 16px;
            flex: 1;
            overflow: hidden;
        }

        .panel {
            flex: 1;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Tabela */
        .table-wrapper {
            flex: 1;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
        }

        th {
            background-color: var(--surface);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 16px;
            position: sticky;
            top: 0;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--row-hover); }

        /* Mapa e Status */
        .map-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        #map { width: 100%; height: 100%; display: none; }
        
        .status-message {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .status-icon { font-size: 24px; }

        /* Modais */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--overlay);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
            padding: 16px;
        }

        .modal-dialog {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
        }
        .btn-close:hover { color: var(--danger); }

        .modal-body {
            padding: 20px;
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        .modal-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-row:last-child { margin-bottom: 0; }

        .modal-body ul { padding-left: 18px; margin-top: 10px; }
        .modal-body li { margin-bottom: 6px; }

        /* ==========================================
           REGRAS DE ADAPTAÇÃO PARA DISPOSITIVOS MÓVEIS
           ========================================== */
        @media (max-width: 768px) {
            body {
                height: auto;
                overflow-y: auto;
            }

            .topbar {
                padding: 0 16px;
            }

            .app-layout {
                padding: 12px;
                height: auto;
                overflow: visible;
                gap: 12px;
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 16px;
            }

            .input-group {
                width: 100%;
            }

            input, select, .btn-primary {
                width: 100%;
                height: 40px; /* Área de toque expandida para mobile */
                font-size: 14px;
            }

            .data-workspace {
                flex-direction: column;
                height: auto;
                overflow: visible;
                gap: 12px;
            }

            .panel {
                flex: none;
                height: 380px; /* Altura fixa confortável para rolar no celular */
            }

            th, td {
                padding: 10px 12px; /* Margens internas ligeiramente mais compactas */
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <span class="brand-highlight">PP2LA</span> 
            <span data-i18n="app_title">Signal Intelligence System</span>
        </div>
        <div class="topbar-actions">
            <button class="btn-text" onclick="openModal('helpModal')" data-i18n="btn_help">Ajuda</button>
            <button class="btn-text" onclick="openModal('optionsModal')" data-i18n="btn_options">Configurações</button>
        </div>
    </header>

    <main class="app-layout">
        
        <div class="toolbar">
            <div class="input-group">
                <label data-i18n="lbl_freq">Freq (kHz)</label>
                <input type="text" id="freqInput" placeholder="Ex: 10150">
            </div>
            <div class="input-group">
                <label data-i18n="lbl_range">Tolerância</label>
                <select id="rangeInput">
                    <option value="0" data-i18n="opt_exact">Exata</option>
                    <option value="1">+/- 1 kHz</option>
                    <option value="2" selected>+/- 2 kHz</option>
                    <option value="5">+/- 5 kHz</option>
                    <option value="10">+/- 10 kHz</option>
                    <option value="any" data-i18n="opt_any">Qualquer</option>
                </select>
            </div>
            <div class="input-group">
                <label data-i18n="lbl_mod">Modulação</label>
                <select id="modInput">
                    <option value="All" data-i18n="opt_all">Todas</option>
                    <option value="Voice">Voice</option>
                    <option value="Data">Data</option>
                    <option value="Morse">Morse</option>
                </select>
            </div>
            <div class="input-group">
                <label data-i18n="lbl_prot">Filtro de Protocolo</label>
                <select id="protInput">
                    <option value="All" data-i18n="opt_all_prot">Todos</option>
                    <option value="ALE">ALE</option>
                    <option value="STANAG">STANAG</option>
                    <option value="PACTOR">PACTOR</option>
                    <option value="MIL-STD">MIL-STD</option>
                    <option value="FSK">FSK</option>
                    <option value="PSK">PSK</option>
                    <option value="DSC">DSC</option>
                    <option value="NAVTEX">NAVTEX</option>
                </select>
            </div>
            <button class="btn-primary" onclick="buscarSinais()" data-i18n="btn_search">Buscar Sinais</button>
        </div>

        <div class="data-workspace">
            
            <div class="panel">
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th data-i18n="th_freq">Freq</th>
                                <th data-i18n="th_station">Entidade / Estação</th>
                                <th data-i18n="th_mod">Mod.</th>
                                <th data-i18n="th_prot">Protocolo</th>
                                <th data-i18n="th_loc">Localidade</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="panel">
                <div class="map-wrapper">
                    <div id="status-msg" class="status-message">
                        <span class="status-icon">⏳</span>
                        <span data-i18n="msg_loading">Inicializando motor de base de dados...</span>
                    </div>
                    <div id="map"></div>
                </div>
            </div>

        </div>
    </main>

    <div id="optionsModal" class="modal-backdrop" onclick="closeModalOutside(event, 'optionsModal')">
        <div class="modal-dialog">
            <div class="modal-header">
                <div class="modal-title" data-i18n="modal_opt_title">Configurações do System</div>
                <button class="btn-close" onclick="closeModal('optionsModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-row">
                    <strong data-i18n="lbl_theme">Aparência:</strong>
                    <select id="themeSelect" onchange="changeTheme(this.value)">
                        <option value="dark" data-i18n="opt_dark">Dark Mode (Padrão)</option>
                        <option value="light" data-i18n="opt_light">Light Mode</option>
                    </select>
                </div>
                <div class="modal-row">
                    <strong data-i18n="lbl_lang">Idioma da Interface:</strong>
                    <select id="langSelect" onchange="changeLanguage(this.value)">
                        <option value="pt">Português</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="helpModal" class="modal-backdrop" onclick="closeModalOutside(event, 'helpModal')">
        <div class="modal-dialog">
            <div class="modal-header">
                <div class="modal-title" data-i18n="modal_help_title">Manual Rápido de Operação</div>
                <button class="btn-close" onclick="closeModal('helpModal')">✕</button>
            </div>
            <div class="modal-body" id="helpContent">
                </div>
        </div>
    </div>

    <script>
        let ilgData = [];
        let map = null;
        let currentMarker = null;

        // Dicionário do Sistema (i18n)
        const translations = {
            'pt': {
                'app_title': 'Signal Intelligence System', 'btn_options': 'Configurações', 'btn_help': 'Ajuda',
                'lbl_freq': 'Freq (kHz)', 'lbl_range': 'Tolerância', 'lbl_mod': 'Modulação', 'lbl_prot': 'Filtro de Protocolo',
                'opt_exact': 'Exata', 'opt_any': 'Qualquer', 'opt_all': 'Todas', 'opt_all_prot': 'Todos',
                'btn_search': 'Buscar Sinais', 'th_freq': 'Freq', 'th_station': 'Entidade / Estação', 'th_mod': 'Mod.', 'th_prot': 'Protocolo', 'th_loc': 'Localidade',
                'msg_loading': 'Inicializando motor de base de dados...',
                'msg_ready': 'Sistema Pronto. <br> Execute uma varredura para visualizar no mapa.',
                'msg_error': 'Falha na leitura do banco de dados (ILGADATA.zip não localizado).',
                'msg_no_coord': 'Coordenadas indisponíveis no banco de dados para:',
                'modal_opt_title': 'Configurações do Sistema', 'lbl_theme': 'Aparência:', 'opt_dark': 'Dark Mode (Padrão)', 'opt_light': 'Light Mode',
                'lbl_lang': 'Idioma da Interface:', 'modal_help_title': 'Manual Rápido de Operação',
                'help_text': `<p>Instruções para extração de dados utilitários HF:</p>
                              <ul>
                                <li><b>Varredura Direcionada:</b> Insira a frequência central (kHz). Ajuste a "Tolerância" para compensar desvios ou buscar redes adjacentes.</li>
                                <li><b>Filtro de Emissão:</b> Isole os resultados selecionando sinais de Voz, Dados (Digitais) ou Código Morse (CW).</li>
                                <li><b>Geolocalização:</b> Clique sobre qualquer interceptação na tabela para plotar a origem transmissora no mapa via satélite (quando disponível).</li>
                              </ul>`
            },
            'en': {
                'app_title': 'Signal Intelligence System', 'btn_options': 'Settings', 'btn_help': 'Help',
                'lbl_freq': 'Freq (kHz)', 'lbl_range': 'Tolerance', 'lbl_mod': 'Modulation', 'lbl_prot': 'Protocol Filter',
                'opt_exact': 'Exact', 'opt_any': 'Any', 'opt_all': 'All', 'opt_all_prot': 'All',
                'btn_search': 'Scan Signals', 'th_freq': 'Freq', 'th_station': 'Entity / Station', 'th_mod': 'Mod.', 'th_prot': 'Protocol', 'th_loc': 'Location',
                'msg_loading': 'Initializing database engine...',
                'msg_ready': 'System Ready. <br> Run a scan to visualize on the map.',
                'msg_error': 'Database read failure (ILGADATA.zip not found).',
                'msg_no_coord': 'Coordinates unavailable in the database for:',
                'modal_opt_title': 'System Settings', 'lbl_theme': 'Appearance:', 'opt_dark': 'Dark Mode (Default)', 'opt_light': 'Light Mode',
                'lbl_lang': 'Interface Language:', 'modal_help_title': 'Quick Operation Manual',
                'help_text': `<p>Instructions for HF utility data extraction:</p>
                              <ul>
                                <li><b>Targeted Scan:</b> Enter the center frequency (kHz). Adjust "Tolerance" to compensate for drift or search adjacent nets.</li>
                                <li><b>Emission Filter:</b> Isolate results by selecting Voice, Data (Digital), or Morse Code (CW) signals.</li>
                                <li><b>Geolocation:</b> Click any interception in the table to plot the transmitting origin on the satellite map (when available).</li>
                              </ul>`
            },
            'es': {
                'app_title': 'Signal Intelligence System', 'btn_options': 'Configuración', 'btn_help': 'Ayuda',
                'lbl_freq': 'Frec (kHz)', 'lbl_range': 'Tolerancia', 'lbl_mod': 'Modulación', 'lbl_prot': 'Filtro Protocolo',
                'opt_exact': 'Exacta', 'opt_any': 'Cualquiera', 'opt_all': 'Todas', 'opt_all_prot': 'Todos',
                'btn_search': 'Buscar Señales', 'th_freq': 'Frec', 'th_station': 'Entidad / Estación', 'th_mod': 'Mod.', 'th_prot': 'Protocolo', 'th_loc': 'Ubicación',
                'msg_loading': 'Inicializando motor de base de dados...',
                'msg_ready': 'Sistema Listo. <br> Ejecute una búsqueda para visualizar en el mapa.',
                'msg_error': 'Fallo en lectura de base de datos (ILGADATA.zip no encontrado).',
                'msg_no_coord': 'Coordenadas no disponibles en la base de datos para:',
                'modal_opt_title': 'Configuración del Sistema', 'lbl_theme': 'Apariencia:', 'opt_dark': 'Modo Oscuro (Predeterminado)', 'opt_light': 'Modo Claro',
                'lbl_lang': 'Idioma de Interfaz:', 'modal_help_title': 'Manual Rápido de Operación',
                'help_text': `<p>Instrucciones para extracción de datos utilitarios HF:</p>
                              <ul>
                                <li><b>Búsqueda Dirigida:</b> Ingrese la frecuencia central (kHz). Ajuste la "Tolerancia" para compensar desvíos o buscar redes adyacentes.</li>
                                <li><b>Filtro de Emisión:</b> Aísle los resultados seleccionando señales de Voz, Datos (Digitales) o Código Morse (CW).</li>
                                <li><b>Geolocalización:</b> Haga clic en cualquier interceptación de la tabla para trazar el origen en el mapa satelital (cuando esté disponible).</li>
                              </ul>`
            }
        };

        let currentLang = 'pt';

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    if (el.tagName === 'INPUT') el.placeholder = translations[lang][key];
                    else el.innerHTML = translations[lang][key];
                }
            });
            document.getElementById('helpContent').innerHTML = translations[lang]['help_text'];
            
            const statusDiv = document.getElementById('status-msg');
            const statusIcon = '<span class="status-icon">✅</span><br>';
            if (statusDiv.style.display !== 'none' && ilgData.length > 0) {
                statusDiv.innerHTML = statusIcon + translations[lang]['msg_ready'];
            }
        }

        function changeTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            if(map) { setTimeout(() => map.invalidateSize(), 100); }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function closeModalOutside(event, id) { if (event.target.id === id) closeModal(id); }

        changeLanguage('pt');

        // Carregamento do BD (JSZip)
        fetch('ILGADATA.zip')
            .then(response => {
                if(!response.ok) throw new Error("ZIP falhou");
                return response.blob();
            })
            .then(blob => JSZip.loadAsync(blob))
            .then(zip => zip.file("ILGADATA.TXT").async("string"))
            .then(text => {
                ilgData = text.split('\n');
                const statusDiv = document.getElementById('status-msg');
                statusDiv.innerHTML = '<span class="status-icon">✅</span><br>' + translations[currentLang]['msg_ready'];
            })
            .catch(err => {
                const statusDiv = document.getElementById('status-msg');
                statusDiv.innerHTML = '<span class="status-icon">❌</span><br>' + translations[currentLang]['msg_error'];
                statusDiv.style.color = "var(--danger)";
            });

        function initMap() {
            if (map) return;
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', {
                maxZoom: 22,
                attribution: 'Google Maps'
            }).addTo(map);
        }

        function buscarSinais() {
            if (ilgData.length === 0) return;

            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = ''; 

            const freqStr = document.getElementById('freqInput').value.replace(',', '.');
            const targetFreq = parseFloat(freqStr);
            const rangeVal = document.getElementById('rangeInput').value;
            const ignorarFreq = rangeVal === 'any';
            
            if (!ignorarFreq && isNaN(targetFreq)) return;
            
            const margin = ignorarFreq ? 0 : parseFloat(rangeVal);
            const modFiltro = document.getElementById('modInput').value;
            const protFiltro = document.getElementById('protInput').value;

            const regexFreq = /^\s*(\d{1,5}\.\d{2})/;
            const regexMode = /(AM|USB[A-Z0-9]*|LSB[A-Z0-9]*|ISB|CW|FM|FSK|DRM|DATA(?::[A-Z]+(?:\s+[A-Z]+)*)?)/i;
            const regexProt = /((?:STANAG|PACTOR|ALE|MIL-STD|SITOR|NAVTEX|GMDSS|LINK|MFSK|FSK|PSK|RTTY|FAX|WEFAX|DGPS|MPSK|NT-\d+|AT-\d+|HFDL|SELCAL|BAUDOT|DSC|SYNOP|ARQ|FEC).*?)(?=\s{2,}|$)/i;
            const regexCoords = /(-?\d{1,2}\.\d{4,}),\s*(-?\d{1,3}\.\d{4,})/;

            ilgData.forEach(line => {
                const fMatch = line.match(regexFreq);
                if(!fMatch) return;
                
                const freq = parseFloat(fMatch[1]);
                if(!ignorarFreq && Math.abs(freq - targetFreq) > margin) return;

                const station = line.substring(8, 38).trim();
                if(station.includes("STATION") || station.includes("######")) return;

                const mMatch = line.match(regexMode);
                const modeRaw = mMatch ? mMatch[1].trim().toUpperCase() : "";

                if(modFiltro !== "All") {
                    const modeNorm = modeRaw.replace(/\s+/g, ' ');
                    if(modFiltro === "Voice" && !(modeNorm.includes("DATA:VOICE") || /AM|USB|LSB|ISB|FM/.test(modeNorm))) return;
                    if(modFiltro === "Morse" && !(modeNorm.includes("DATA:MORSE") || modeNorm.includes("CW"))) return;
                    if(modFiltro === "Data" && !(/DATA:DATA|DATA:TELEX|DATA:PULSE|DATA:FAX|DATA:EMAIL|FSK|PSK|DRM/.test(modeNorm))) return;
                }

                const pMatch = line.match(regexProt);
                const protRaw = pMatch ? pMatch[1].trim() : "";

                if(protFiltro !== "All" && !protRaw.toUpperCase().includes(protFiltro)) return;

                const cMatch = line.match(regexCoords);
                const lat = cMatch ? parseFloat(cMatch[1]) : null;
                const lon = cMatch ? parseFloat(cMatch[2]) : null;
                const location = line.substring(130, 156).trim();

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${freq.toFixed(2)}</td>
                    <td>${station}</td>
                    <td>${modeRaw}</td>
                    <td>${protRaw}</td>
                    <td>${location}</td>
                `;

                tr.onclick = () => mostrarMapa(lat, lon, station, freq);
                tbody.appendChild(tr);
            });
        }

        function mostrarMapa(lat, lon, station, freq) {
            const msgDiv = document.getElementById('status-msg');
            const mapDiv = document.getElementById('map');

            if (lat !== null && lon !== null) {
                msgDiv.style.display = 'none';
                mapDiv.style.display = 'block';
                initMap();
                
                if (currentMarker) map.removeLayer(currentMarker);
                map.setView([lat, lon], 14); 
                currentMarker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(`<b>${station}</b><br>${freq} kHz`)
                    .openPopup();
            } else {
                mapDiv.style.display = 'none';
                msgDiv.style.display = 'flex';
                msgDiv.innerHTML = `<span class="status-icon">📍</span><b>${translations[currentLang]['msg_no_coord']}</b><br><span style="color: var(--danger);">'${station}'</span>`;
            }
        }
    </script>
</body>
</html>
